# Run dcd on the same host as Docker Engine (docker.sock passthrough).
# From repo root: docker compose -f examples/docker-compose.dcd.yml up -d --build

services:
  dcd:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dcd:local
    container_name: dcd-driver
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DEVICE_CONNECT_ALLOW_INSECURE: "true"
      DCD_DEVICE_ID: docker-host-edge
      DCD_TENANT: default
    # Simulator only (no docker.sock required):
    # environment:
    #   DCD_SIM: "true"
    # command: ["--sim"]

    # Portal example — mount credentials and set:
    # environment:
    #   DEVICE_CONNECT_PORTAL: "true"
    #   NATS_CREDENTIALS_FILE: /creds/device.creds.json
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
    #   - ${HOME}/.config/device-connect:/creds:ro
